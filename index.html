<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Haryy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:Arial;
}

.profile-card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* avatar wrapper */

.avatar-box{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    padding:4px;
    background:linear-gradient(45deg,#ff0080,#ff8c00,#40e0d0,#ff0080);
    background-size:300% 300%;
    animation:rotateBorder 6s linear infinite;
}

.avatar{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

@keyframes rotateBorder{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.name{
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

.bio{
    color:#777;
    margin-bottom:25px;
}

.avatar-wrapper{
    position:relative;
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
}

.avatar-wrapper::before{

    content:"";
    position:absolute;
    inset:-4px;

    background:conic-gradient(
        #ff0080,
        #ff8c00,
        #40e0d0,
        #ff0080
    );

    border-radius:50%;

    animation:spinBorder 3s linear infinite;

}

.avatar{
    position:relative;
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    background:white;
}

@keyframes spinBorder{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

.social-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:14px;
    border-radius:14px;
    margin:10px 0;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
    font-size:16px;
}

.social-btn i{
    font-size:20px;
}

.facebook{
background:#1877f2;
color:white;
}

.instagram{
background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);
color:white;
}

.tiktok{
background:black;
color:white;
}

.github{
background:#333;
color:white;
}

.social-btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.social-btn:active{
transform:scale(0.95);
}

.qr{
margin-top:25px;
}

.qr img{
width:140px;
}

</style>
</head>

<body>

<div class="profile-card">

    <div class="avatar-wrapper">
        <img src="harry-potter-chibi19.webp" class="avatar">
    </div>

<div class="name">Tâm Nguyễn</div>

<div class="bio">
Hello! You can call me Harry <br>Have a nice day 😉
</div>

<a href="https://www.facebook.com/duytam204" class="social-btn facebook">
<i class="fab fa-facebook"></i>
Facebook
</a>

<a href="https://www.instagram.com/_harry204_" class="social-btn instagram">
<i class="fab fa-instagram"></i>
Instagram
</a>

<a href="https://www.tiktok.com/@harry_music7" class="social-btn tiktok">
<i class="fab fa-tiktok"></i>
TikTok
</a>

<a href="https://github.com/Harryy204" class="social-btn github">
<i class="fab fa-github"></i>
GitHub
</a>

</div>

</body>
</html>
